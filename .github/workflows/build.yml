name: Build FakeSecureBoot

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup EDK2
        run: |
          git clone https://github.com/tianocore/edk2.git
          cd edk2
          git submodule update --init --recursive
          cp -r ../FakeSecureBootPkg ./
          sudo apt-get install -y uuid-dev nasm iasl build-essential

      - name: Build
        run: |
          cd edk2
          make -C BaseTools
          source edksetup.sh
          build -a X64 -t GCC5 -p FakeSecureBootPkg/FakeSecureBootPkg.dsc -b RELEASE

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: FakeSecureBoot.efi
          path: edk2/Build/FakeSecureBootPkg/RELEASE_GCC5/X64/FakeSecureBoot.efi
